# Local PostgreSQL for edu-platform (optional).
# Usage: docker compose up -d
# Then set DATABASE_URL in .env to match POSTGRES_* below.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edu-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: edu
      POSTGRES_PASSWORD: edu
      POSTGRES_DB: edu_platform
    ports:
      - "5432:5432"
    volumes:
      - edu_platform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu -d edu_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
